name: Build Complete App Package

on:
  push:
    branches: [ main ]

jobs:

# ================= WINDOWS =================
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java (JDK 21 + jpackage)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build C++ (Windows)
        run: |
          cd Compresor
          cmake .
          cmake --build .
          move Compresor.exe ..\Aplicatie_Java\executabile\CompresorHuffman.exe

          cd ..\Decompresor
          cmake .
          cmake --build .
          move Decompresor.exe ..\Aplicatie_Java\executabile\DecompresorHuffman.exe

      - name: Build Windows Installer (.exe)
        run: |
          jpackage ^
            --input Aplicatie_Java ^
            --name HuffmanCompiler ^
            --main-jar Huffman_Compiler.jar ^
            --main-class MeniuPrincipal ^
            --type exe ^
            --win-dir-chooser ^
            --win-shortcut ^
            --win-menu ^
            --app-version 1.0.0

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: Windows_Installer
          path: HuffmanCompiler-1.0.0.exe


# ================= LINUX DEB =================
  build-linux-deb:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build C++ (Linux)
        run: |
          cd Compresor
          cmake .
          make
          mv Compresor ../Aplicatie_Java/executabile/CompresorHuffman_linux

          cd ../Decompresor
          cmake .
          make
          mv Decompresor ../Aplicatie_Java/executabile/DecompresorHuffman_linux

      - name: Build Linux DEB
        run: |
          jpackage \
            --input Aplicatie_Java \
            --name HuffmanCompiler \
            --main-jar Huffman_Compiler.jar \
            --main-class MeniuPrincipal \
            --type deb \
            --app-version 1.0.0

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: Linux_DEB
          path: huffmancompiler_1.0.0_amd64.deb


# ================= LINUX RPM =================
  build-linux-rpm:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools + rpm
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake rpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build C++ (Linux)
        run: |
          cd Compresor
          cmake .
          make
          mv Compresor ../Aplicatie_Java/executabile/CompresorHuffman_linux

          cd ../Decompresor
          cmake .
          make
          mv Decompresor ../Aplicatie_Java/executabile/DecompresorHuffman_linux

      - name: Build Linux RPM
        run: |
          jpackage \
            --input Aplicatie_Java \
            --name HuffmanCompiler \
            --main-jar Huffman_Compiler.jar \
            --main-class MeniuPrincipal \
            --type rpm \
            --app-version 1.0.0

      - name: Upload RPM
        uses: actions/upload-artifact@v4
        with:
          name: Linux_RPM
          path: huffmancompiler-1.0.0-1.x86_64.rpm


# ================= MAC =================
  build-mac:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install CMake
        run: brew install cmake

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build C++ (Mac)
        run: |
          cd Compresor
          cmake .
          make
          mv Compresor ../Aplicatie_Java/executabile/CompresorHuffman_mac

          cd ../Decompresor
          cmake .
          make
          mv Decompresor ../Aplicatie_Java/executabile/DecompresorHuffman_mac

      - name: Build Mac DMG
        run: |
          jpackage \
            --input Aplicatie_Java \
            --name HuffmanCompiler \
            --main-jar Huffman_Compiler.jar \
            --main-class MeniuPrincipal \
            --type dmg \
            --app-version 1.0.0 \
            --mac-package-name HuffmanCompiler

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Mac_DMG
          path: HuffmanCompiler-1.0.0.dmg
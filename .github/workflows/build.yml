name: Build Complete App Package

on:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'oracle'

      - name: Build Windows Installer
        run: |
          jpackage --input "Aplicație_Java" `
            --name HuffmanCompiler `
            --main-jar Huffman_Compiler.jar `
            --type exe `
            --win-dir-chooser `
            --win-shortcut `
            --app-version 1.0.0

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: Windows_Installer
          path: HuffmanCompiler-1.0.0.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'oracle'

      - name: Build C++ Linux
        run: |
          cd Compresor && cmake . && make
          mv Compresor ../Aplicație_Java/executabile/CompresorHuffman_linux
          cd ../Decompresor && cmake . && make
          mv Decompresor ../Aplicație_Java/executabile/DecompresorHuffman_linux

      - name: Build Linux DEB Installer
        run: |
          jpackage --input "Aplicație_Java" \
            --name HuffmanCompiler \
            --main-jar Huffman_Compiler.jar \
            --type deb \
            --app-version 1.0.0

      - name: Upload Linux DEB Installer
        uses: actions/upload-artifact@v4
        with:
          name: Linux_Installer_DEB
          path: huffmancompiler_1.0.0_amd64.deb

  build-linux-rpm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'oracle'

      - name: Install RPM tools
        run: sudo apt-get install -y rpm

      - name: Build C++ Linux
        run: |
          cd Compresor && cmake . && make
          mv Compresor ../Aplicație_Java/executabile/CompresorHuffman_linux
          cd ../Decompresor && cmake . && make
          mv Decompresor ../Aplicație_Java/executabile/DecompresorHuffman_linux

      - name: Build Linux RPM Installer
        run: |
          jpackage --input "Aplicație_Java" \
            --name HuffmanCompiler \
            --main-jar Huffman_Compiler.jar \
            --type rpm \
            --app-version 1.0.0

      - name: Upload Linux RPM Installer
        uses: actions/upload-artifact@v4
        with:
          name: Linux_Installer_RPM
          path: huffmancompiler-1.0.0-1.x86_64.rpm

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'oracle'

      - name: Build C++ Mac
        run: |
          cd Compresor && cmake . && make
          mv Compresor ../Aplicație_Java/executabile/CompresorHuffman_mac
          cd ../Decompresor && cmake . && make
          mv Decompresor ../Aplicație_Java/executabile/DecompresorHuffman_mac

      - name: Build Mac Installer
        run: |
          jpackage --input "Aplicație_Java" \
            --name HuffmanCompiler \
            --main-jar Huffman_Compiler.jar \
            --type dmg \
            --app-version 1.0.0

      - name: Upload Mac Installer
        uses: actions/upload-artifact@v4
        with:
          name: Mac_Installer
          path: HuffmanCompiler-1.0.0.dmg
name: Build Complete App Package

on:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'oracle'

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Build C++ Windows
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path Aplicatie_Java/executabile

          cd Compresor_Huffman
          cmake .
          cmake --build . --config Release
          Move-Item Release\Compresor_Huffman.exe ..\Aplicatie_Java\executabile\CompresorHuffman_windows.exe

          cd ..\Decompresor_Huffman
          cmake .
          cmake --build . --config Release
          Move-Item Release\Decompresor_Huffman.exe ..\Aplicatie_Java\executabile\DecompresorHuffman_windows.exe

      - name: Build Windows Installer
        run: jpackage --input Aplicatie_Java --name HuffmanCompiler --main-jar Huffman_Compiler.jar --type exe --win-dir-chooser --win-shortcut --app-version 1.0.0

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: Windows_Installer
          path: HuffmanCompiler-1.0.0.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'oracle'

      - name: Build C++ Linux
        run: |
          mkdir -p Aplicatie_Java/executabile
          cd Compresor_Huffman && cmake . && make
          mv Compresor_Huffman ../Aplicatie_Java/executabile/CompresorHuffman_linux
          cd ../Decompresor_Huffman && cmake . && make
          mv Decompresor_Huffman ../Aplicatie_Java/executabile/DecompresorHuffman_linux

      - name: Build Linux DEB Installer
        run: jpackage --input Aplicatie_Java --name HuffmanCompiler --main-jar Huffman_Compiler.jar --type deb --app-version 1.0.0

      - name: Upload Linux DEB Installer
        uses: actions/upload-artifact@v4
        with:
          name: Linux_Installer_DEB
          path: huffmancompiler_1.0.0_amd64.deb

  build-linux-rpm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'oracle'

      - name: Install RPM tools
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Build C++ Linux
        run: |
          mkdir -p Aplicatie_Java/executabile
          cd Compresor_Huffman && cmake . && make
          mv Compresor_Huffman ../Aplicatie_Java/executabile/CompresorHuffman_linux
          cd ../Decompresor_Huffman && cmake . && make
          mv Decompresor_Huffman ../Aplicatie_Java/executabile/DecompresorHuffman_linux

      - name: Build Linux RPM Installer
        run: jpackage --input Aplicatie_Java --name HuffmanCompiler --main-jar Huffman_Compiler.jar --type rpm --app-version 1.0.0

      - name: Upload Linux RPM Installer
        uses: actions/upload-artifact@v4
        with:
          name: Linux_Installer_RPM
          path: huffmancompiler-1.0.0-1.x86_64.rpm

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'oracle'

      - name: Build C++ Mac
        run: |
          mkdir -p Aplicatie_Java/executabile
          cd Compresor_Huffman && cmake . && make
          mv Compresor_Huffman ../Aplicatie_Java/executabile/CompresorHuffman_mac
          cd ../Decompresor_Huffman && cmake . && make
          mv Decompresor_Huffman ../Aplicatie_Java/executabile/DecompresorHuffman_mac

      - name: Build Mac Installer
        run: jpackage --input Aplicatie_Java --name HuffmanCompiler --main-jar Huffman_Compiler.jar --type dmg --app-version 1.0.0

      - name: Upload Mac Installer
        uses: actions/upload-artifact@v4
        with:
          name: Mac_Installer
          path: HuffmanCompiler-1.0.0.dmg

  release:
    needs: [build-windows, build-linux, build-linux-rpm, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: HuffmanCompiler v1.0.${{ github.run_number }}
          body: |
            ## Download
            - Windows: HuffmanCompiler-1.0.0.exe
            - Linux Debian/Ubuntu: huffmancompiler_1.0.0_amd64.deb
            - Linux RPM: huffmancompiler-1.0.0-1.x86_64.rpm
            - Mac: HuffmanCompiler-1.0.0.dmg
          files: |
            Windows_Installer/HuffmanCompiler-1.0.0.exe
            Linux_Installer_DEB/huffmancompiler_1.0.0_amd64.deb
            Linux_Installer_RPM/huffmancompiler-1.0.0-1.x86_64.rpm
            Mac_Installer/HuffmanCompiler-1.0.0.dmg
